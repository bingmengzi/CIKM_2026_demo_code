            for (let i = 0; i &lt;= 180; i++) {
                const angle = (i * Math.PI) / 180;
                const cos = Math.cos(Math.PI - angle);
                const sin = Math.sin(Math.PI - angle);
                
                let tickLength, strokeWidth, opacity, showNumber = false;
                
                if (i % 10 === 0) {
                    tickLength = 40;
                    strokeWidth = 2.5;
                    opacity = 0.9;
                    showNumber = true;
                } else if (i % 5 === 0) {
                    tickLength = 30;
                    strokeWidth = 2;
                    opacity = 0.8;
                } else {
                    tickLength = 20;
                    strokeWidth = 1.5;
                    opacity = 0.7;
                }
                
                const x1 = 480 + 456 * cos;
                const y1 = 480 - 456 * sin;
                const x2 = 480 + (456 - tickLength) * cos;
                const y2 = 480 - (456 - tickLength) * sin;
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', 'rgba(255,255,255,' + opacity + ')');
                line.setAttribute('stroke-width', strokeWidth);
                scaleContainer.appendChild(line);
                
                if (showNumber) {
                    // 外圈数字
                    const outerTextX = 480 + 400 * cos;
                    const outerTextY = 480 - 400 * sin + 8;
                    
                    const outerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    outerText.setAttribute('x', outerTextX);
                    outerText.setAttribute('y', outerTextY);
                    outerText.setAttribute('text-anchor', 'middle');
                    outerText.setAttribute('fill', 'rgba(255,255,255,0.95)');
                    outerText.setAttribute('font-family', 'Arial, sans-serif');
                    outerText.setAttribute('font-size', '20');
                    outerText.setAttribute('font-weight', 'bold');
                    outerText.textContent = i;
                    scaleContainer.appendChild(outerText);
                    
                    // 内圈数字
                    const innerTextX = 480 + 350 * cos;
                    const innerTextY = 480 - 350 * sin + 6;
                    
                    const innerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    innerText.setAttribute('x', innerTextX);
                    innerText.setAttribute('y', innerTextY);
                    innerText.setAttribute('text-anchor', 'middle');
                    innerText.setAttribute('fill', 'rgba(255,255,255,0.8)');
                    innerText.setAttribute('font-family', 'Arial, sans-serif');
                    innerText.setAttribute('font-size', '16');
                    innerText.setAttribute('font-weight', '500');
                    innerText.textContent = 180 - i;
                    scaleContainer.appendChild(innerText);
                }
            }
        }

        // 初始化量角器
        function initializeProtractor() {
            protractor.style.transformOrigin = '480px 480px';
            updateProtractorTransform();
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 模式切换
            document.getElementById('measureModeBtn').addEventListener('click', () =&gt; switchMode('measure'));
            document.getElementById('drawModeBtn').addEventListener('click', () =&gt; switchMode('draw'));

            // 量角器左键选择和拖拽
            protractor.addEventListener('mousedown', function(e) {
                if (e.button === 0) {
                    e.preventDefault();
                    selectProtractor();
                    startDragging(e);
                }
            });

            // 全局鼠标事件
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
            document.addEventListener('click', handleCanvasClick);

            // 旋转事件
            protractor.addEventListener('wheel', function(e) {
                if (isProtractorSelected) {
                    e.preventDefault();
                    rotateProtractor(e.deltaY &gt; 0 ? 2 : -2);
                }
            });

            // 量角模式控制按钮
            document.getElementById('generateAngleBtn').addEventListener('click', generateRandomAngle);
            document.getElementById('extendLinesBtn').addEventListener('click', toggleExtendLines);
            document.getElementById('showAngleBtn').addEventListener('click', showAngleValue);

            // 画角模式控制按钮
            document.getElementById('resetDrawBtn').addEventListener('click', resetDrawing);
            document.getElementById('undoStepBtn').addEventListener('click', undoDrawingStep);

            // 确认按钮
            document.getElementById('confirmBtn').addEventListener('click', confirmAlignment);

            // 通用控制按钮
            document.getElementById('clearBtn').addEventListener('click', clearAll);

            // 点击空白区域取消选择
            document.addEventListener('click', function(e) {
                if (!protractor.contains(e.target) &amp;&amp; !e.target.closest('.controls') &amp;&amp; !e.target.closest('.mode-selector') &amp;&amp; !e.target.closest('.step-indicator')) {
                    deselectProtractor();
                }
            });
        }

        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新模式按钮状态
            document.getElementById('measureModeBtn').classList.toggle('active', mode === 'measure');
            document.getElementById('drawModeBtn').classList.toggle('active', mode === 'draw');
            
            // 显示/隐藏对应控制面板
            document.getElementById('measureControls').style.display = mode === 'measure' ? 'block' : 'none';
            document.getElementById('drawControls').style.display = mode === 'draw' ? 'block' : 'none';
            
            // 显示/隐藏步骤指示器
            document.getElementById('stepIndicator').style.display = mode === 'draw' ? 'block' : 'none';
            
            // 显示/隐藏角度显示器
            const angleDisplay = document.getElementById('angleDisplay');
            angleDisplay.classList.toggle('hidden', mode === 'draw');
            
            // 更新指令文本
            const instruction = document.getElementById('instruction');
            if (mode === 'measure') {
                instruction.textContent = '🖱️ Left-click the protractor to drag | 🔄 Trackpad/wheel to rotate | 📐 Generate a random angle to measure | 🧲 Auto-snap to the angle vertex';
            } else {
                instruction.textContent = '🖱️ Follow the steps: click to set the vertex &rarr; drag to draw the first ray &rarr; move the protractor to align and confirm &rarr; click anywhere to place a point &rarr; click any orange point to connect lines';
            }
            
            // 清除当前内容并重置状态
            clearAll();
            if (mode === 'draw') {
                resetDrawing();
            }
        }

        // 处理画布点击事件
        function handleCanvasClick(e) {
            if (currentMode !== 'draw' || protractor.contains(e.target) || e.target.closest('.controls') || e.target.closest('.mode-selector') || e.target.closest('.step-indicator')) {
                return;
            }

            const rect = document.getElementById('geometryCanvas').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (drawingStep === 0) {
                // Step 1: Identify the vertex of the angle
                setDrawingVertex(x, y);
            } else if (drawingStep === 4) {
                // Step 5: Place a point anywhere on the canvas (orange, fixed, no animation)
                createSecondPoint(x, y);
            } else if (drawingStep === 5) {
                // Step 6: Click any point to connect lines
                handlePointClick(e.target, x, y);
            } else if (drawingStep === 6) {
                // Step 7: Click any orange point to connect lines
                handlePointConnectionClick(e.target, x, y);
            }
        }

        // 设置绘图顶点
        function setDrawingVertex(x, y) {
            const canvas = document.getElementById('geometryCanvas');
            
            // 绘制顶点（橙色）
            const vertex = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            vertex.setAttribute('cx', x);
            vertex.setAttribute('cy', y);
            vertex.setAttribute('r', 8);
            vertex.classList.add('drawing-vertex');
            vertex.setAttribute('data-type', 'drawing');
            vertex.setAttribute('data-point-id', 'vertex');
            canvas.appendChild(vertex);
            
            drawingData.vertex = { x, y, element: vertex };
            drawingData.allPoints.push({ x, y, element: vertex, id: 'vertex' });
            drawingStep = 1;
            updateStepIndicator(2, 'Press and hold the left mouse button to drag and draw the first ray');
        }

        // 创建第二个点（橙色，固定不动）
        function createSecondPoint(x, y) {
            const canvas = document.getElementById('geometryCanvas');
            
            // 移除提示
            const hint = document.querySelector('.click-anywhere-hint');
            if (hint) hint.remove();
            
            // 移除页面点击状态
            document.getElementById('mainContainer').classList.remove('draw-mode-step5');
            
            // 创建橙色点（固定不动，无动画）
            const point = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            point.setAttribute('cx', x);
            point.setAttribute('cy', y);
            point.setAttribute('r', 10);
            point.classList.add('drawing-point', 'fixed');
            point.setAttribute('data-type', 'drawing');
            point.setAttribute('data-point-id', 'second');
            canvas.appendChild(point);
            
            drawingData.secondPoint = { x, y, element: point };
            drawingData.allPoints.push({ x, y, element: point, id: 'second' });
            drawingStep = 5;
            
            // 更新步骤提示
            updateStepIndicator(6, 'Click any orange circle (vertex or newly drawn point) to connect them and complete the angle drawing');
        }

        // 处理点击事件
        function handlePointClick(target, x, y) {
            // 检查是否点击了橙色的点（顶点或第二个点）
            if (target.classList.contains('drawing-point') || target.classList.contains('drawing-vertex')) {
                if (drawingData.vertex &amp;&amp; drawingData.secondPoint) {
                    createSecondRay();
                }
            }
        }

        // 处理连线点击事件（步骤7）
        function handlePointConnectionClick(target, x, y) {
            // 检查是否点击了橙色的点
            if (target.classList.contains('drawing-point') || target.classList.contains('drawing-vertex')) {
                const pointId = target.getAttribute('data-point-id');
                const clickedPoint = drawingData.allPoints.find(p =&gt; p.id === pointId);
                
                if (clickedPoint) {
                    // 连接到其他所有点
                    connectToAllOtherPoints(clickedPoint);
                }
            }
        }

        // 连接到所有其他点
        function connectToAllOtherPoints(fromPoint) {
            const canvas = document.getElementById('geometryCanvas');
            
            drawingData.allPoints.forEach(toPoint =&gt; {
                if (toPoint.id !== fromPoint.id) {
                    // 检查是否已经存在连线
                    const existingLine = canvas.querySelector(`[data-connection=&quot;${fromPoint.id}-${toPoint.id}&quot;], [data-connection=&quot;${toPoint.id}-${fromPoint.id}&quot;]`);
                    
                    if (!existingLine) {
                        // 创建连线
                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', fromPoint.x);
                        line.setAttribute('y1', fromPoint.y);
                        line.setAttribute('x2', toPoint.x);
                        line.setAttribute('y2', toPoint.y);
                        line.classList.add('connection-line');
                        line.setAttribute('data-type', 'drawing');
                        line.setAttribute('data-connection', `${fromPoint.id}-${toPoint.id}`);
                        canvas.appendChild(line);
                    }
                }
            });
            
            drawingStep = 7;
            updateStepIndicator(7, 'Connection complete! You can continue clicking other orange points to create more connections');
        }

        // 创建第二条射线
        function createSecondRay() {
            const canvas = document.getElementById('geometryCanvas');
            
            // 创建正式的第二条射线（从顶点到第二个点，橙色）
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', drawingData.vertex.x);
            line.setAttribute('y1', drawingData.vertex.y);
            line.setAttribute('x2', drawingData.secondPoint.x);
            line.setAttribute('y2', drawingData.secondPoint.y);
            line.classList.add('drawing-line');
            line.setAttribute('data-type', 'drawing');
            canvas.appendChild(line);
            
            drawingData.secondRay = { 
                x: drawingData.secondPoint.x, 
                y: drawingData.secondPoint.y, 
                element: line 
            };
            
            drawingStep = 6;
            
            // 计算角度（但不显示）
            calculateDrawnAngle();
            updateStepIndicator(7, 'Angle drawing complete! Click any orange point to connect to other points');
        }

        // 计算绘制的角度
        function calculateDrawnAngle() {
            if (!drawingData.vertex || !drawingData.firstRay || !drawingData.secondRay) return;

            const vertex = drawingData.vertex;
            const ray1 = drawingData.firstRay;
            const ray2 = drawingData.secondRay;

            // 计算两条射线的角度
            const angle1 = Math.atan2(ray1.y - vertex.y, ray1.x - vertex.x);
            const angle2 = Math.atan2(ray2.y - vertex.y, ray2.x - vertex.x);

            // 计算角度差（弧度转度数）
            let angleDiff = Math.abs(angle2 - angle1) * 180 / Math.PI;
            if (angleDiff &gt; 180) {
                angleDiff = 360 - angleDiff;
            }

            drawingData.angle = Math.round(angleDiff);
        }

        // 确认对齐
        function confirmAlignment() {
            if (drawingStep === 3 &amp;&amp; drawingData.isEdgeAligned) {
                drawingStep = 4;
                document.getElementById('confirmBtn').style.display = 'none';
                
                // 启用全页面点击功能
                document.getElementById('mainContainer').classList.add('draw-mode-step5');
                
                // 显示点击提示
                showClickAnywhereHint();
                updateStepIndicator(5, 'Click the left mouse button anywhere on the page to draw the second point');
            }
        }

        // 显示任意位置点击提示
        function showClickAnywhereHint() {
            const hint = document.createElement('div');
            hint.className = 'click-anywhere-hint';
            hint.textContent = '🖱️ Click anywhere on the page to place a point';
            
            // 定位在屏幕中央上方
            hint.style.position = 'fixed';
            hint.style.left = '50%';
            hint.style.top = '30%';
            hint.style.transform = 'translate(-50%, -50%)';
            
            document.body.appendChild(hint);
            
            // 5秒后自动消失
            setTimeout(() =&gt; {
                if (hint.parentNode) {
                    hint.remove();
                }
            }, 5000);
        }

        // 更新步骤指示器
        function updateStepIndicator(step, text) {
            const indicator = document.getElementById('stepIndicator');
            const confirmBtn = document.getElementById('confirmBtn');
            
            indicator.querySelector('h3').textContent = `step ${step}`;
            indicator.querySelector('p').textContent = text;
            
            // 显示/隐藏确认按钮
            if (step === 4 &amp;&amp; drawingData.isEdgeAligned) {
                confirmBtn.style.display = 'block';
            } else {
                confirmBtn.style.display = 'none';
            }
        }

        // 重置绘图
        function resetDrawing() {
            drawingStep = 0;
            drawingData = {
                vertex: null,
                firstRay: null,
                secondPoint: null,
                secondRay: null,
                isDrawingFirstRay: false,
                tempLine: null,
                isEdgeAligned: false,
                isProtractorMoving: false,
                angle: null,
                pointFixed: false,
                canPlacePoint: false,
                allPoints: []
            };
            
            // 清除绘图元素
            const canvas = document.getElementById('geometryCanvas');
            const drawingElements = canvas.querySelectorAll('[data-type=&quot;drawing&quot;]');
            drawingElements.forEach(el =&gt; el.remove());
            
            // 移除边缘对齐样式
            protractor.classList.remove('edge-aligned');
            
            // 移除页面点击状态
            document.getElementById('mainContainer').classList.remove('draw-mode-step5');
            
            // 移除提示
            const hint = document.querySelector('.click-anywhere-hint');
            if (hint) hint.remove();
            
            updateStepIndicator(1, 'Click the left mouse button anywhere to set the vertex of the angle.');
        }

        // Undo drawing step
        function undoDrawingStep() {
            if (drawingStep > 0) {
                if (drawingStep === 7 || drawingStep === 6) {
                    // 撤销连线或第二条射线
                    const canvas = document.getElementById('geometryCanvas');
                    const connections = canvas.querySelectorAll('[data-connection]');
                    connections.forEach(el =&gt; el.remove());
                    
                    if (drawingData.secondRay) {
                        drawingData.secondRay.element.remove();
                        drawingData.secondRay = null;
                    }
                    
                    drawingStep = 5;
                    updateStepIndicator(6, 'Click on any orange dot (vertex or newly drawn point) to connect them and complete the angle drawing.');
                } else if (drawingStep === 5 && drawingData.secondPoint) {
                    // Undo second point
                    drawingData.secondPoint.element.remove();
                    drawingData.allPoints = drawingData.allPoints.filter(p =&gt; p.id !== 'second');
                    drawingData.secondPoint = null;
                    drawingStep = 4;
                    document.getElementById('mainContainer').classList.add('draw-mode-step5');
                    showClickAnywhereHint();
                    updateStepIndicator(5, 'Click the left mouse button anywhere on the page to draw the second point');
                } else if (drawingStep === 4) {
                    // 撤销确认状态
                    document.getElementById('mainContainer').classList.remove('draw-mode-step5');
                    const hint = document.querySelector('.click-anywhere-hint');
                    if (hint) hint.remove();
                    drawingStep = 3;
                    updateStepIndicator(4, 'After aligning the movable protractor, click &quot; confirm alignment &quot; button');
                } else if (drawingStep &gt;= 1 &amp;&amp; drawingData.firstRay) {
                    // 撤销第一条射线
                    drawingData.firstRay.element.remove();
                    drawingData.firstRay = null;
                    drawingStep = 1;
                    updateStepIndicator(2, 'Hold down the left mouse button and drag to draw the first ray');
                } else if (drawingStep &gt;= 1 &amp;&amp; drawingData.vertex) {
                    // 撤销顶点
                    drawingData.vertex.element.remove();
                    drawingData.allPoints = drawingData.allPoints.filter(p =&gt; p.id !== 'vertex');
                    drawingData.vertex = null;
                    drawingStep = 0;
                    updateStepIndicator(1, 'Click the left mouse button anywhere to set the vertex of the angle.');
                }
            }
        }

        // 选择量角器
        function selectProtractor() {
            isProtractorSelected = true;
            protractor.classList.add('selected');
        }

        // 取消选择量角器
        function deselectProtractor() {
            isProtractorSelected = false;
            protractor.classList.remove('selected');
        }

        // 开始拖拽
        function startDragging(e) {
            isDragging = true;
            const rect = protractor.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            protractor.style.cursor = 'grabbing';
        }

        // 处理鼠标移动
        function handleMouseMove(e) {
            if (isDragging &amp;&amp; isProtractorSelected) {
                const newX = e.clientX - dragOffset.x;
                const newY = e.clientY - dragOffset.y;
                
                protractor.style.left = newX + 'px';
                protractor.style.top = newY + 'px';
                
                // 检查自动吸附
                if (snapEnabled) {
                    if (currentMode === 'measure' &amp;&amp; currentAngle) {
                        checkSnapping(newX + 480, newY + 480);
                    } else if (currentMode === 'draw' &amp;&amp; drawingData.vertex) {
                        checkDrawingSnapping(newX + 480, newY + 480);
                    }
                }
                
                if (currentMode === 'measure') {
                    measureCurrentAngle();
                }
            } else if (currentMode === 'draw') {
                // 处理画线的鼠标移动
                handleDrawingMouseMove(e);
            }
        }

        // 处理绘图模式的鼠标移动
        function handleDrawingMouseMove(e) {
            if (!drawingData.vertex) return;

            const rect = document.getElementById('geometryCanvas').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (drawingData.isDrawingFirstRay) {
                // 更新临时第一条射线
                updateTempLine(drawingData.vertex.x, drawingData.vertex.y, x, y);
            }
        }

        // 更新临时线条
        function updateTempLine(x1, y1, x2, y2) {
            const canvas = document.getElementById('geometryCanvas');
            
            // 移除旧的临时线
            if (drawingData.tempLine) {
                drawingData.tempLine.remove();
            }
            
            // 创建新的临时线
            const tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            tempLine.setAttribute('x1', x1);
            tempLine.setAttribute('y1', y1);
            tempLine.setAttribute('x2', x2);
            tempLine.setAttribute('y2', y2);
            tempLine.classList.add('temp-line');
            canvas.appendChild(tempLine);
            
            drawingData.tempLine = tempLine;
        }

        // 处理鼠标抬起
        function handleMouseUp(e) {
            if (isDragging) {
                stopDragging();
            } else if (currentMode === 'draw') {
                // 处理绘图模式的鼠标抬起
                if (drawingData.isDrawingFirstRay) {
                    finishFirstRay(e);
                }
            }
        }

        // 完成第一条射线绘制
        function finishFirstRay(e) {
            if (!drawingData.vertex) return;

            const rect = document.getElementById('geometryCanvas').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const canvas = document.getElementById('geometryCanvas');
            
            // 移除临时线
            if (drawingData.tempLine) {
                drawingData.tempLine.remove();
                drawingData.tempLine = null;
            }
            
            // 创建正式的第一条射线（橙色）
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', drawingData.vertex.x);
            line.setAttribute('y1', drawingData.vertex.y);
            line.setAttribute('x2', x);
            line.setAttribute('y2', y);
            line.classList.add('drawing-line');
            line.setAttribute('data-type', 'drawing');
            canvas.appendChild(line);
            
            drawingData.firstRay = { x, y, element: line };
            drawingData.isDrawingFirstRay = false;
            drawingStep = 2;
            
            updateStepIndicator(3, 'Move the protractor so that the center point coincides with the vertex of the angle, and align the ray with the edge of the protractor.');
        }

        // 检查绘图模式的吸附
        function checkDrawingSnapping(protractorX, protractorY) {
            if (!drawingData.vertex) return;
            
            const snapDistance = 25;
            const distance = Math.sqrt(
                Math.pow(drawingData.vertex.x - protractorX, 2) + 
                Math.pow(drawingData.vertex.y - protractorY, 2)
            );
            
            if (distance &lt; snapDistance) {
                const newX = drawingData.vertex.x - 480;
                const newY = drawingData.vertex.y - 480;
                
                protractor.style.left = newX + 'px';
                protractor.style.top = newY + 'px';
                
                showSnapIndicator(drawingData.vertex.x, drawingData.vertex.y);
                
                // 检查是否对齐完成
                if (drawingStep === 2 &amp;&amp; drawingData.firstRay) {
                    checkAlignment();
                }
            }
        }

        // 检查对齐状态
        function checkAlignment() {
            if (!drawingData.vertex || !drawingData.firstRay) return;
            
            // 检查中心点对齐
            const protractorRect = protractor.getBoundingClientRect();
            const protractorCenter = {
                x: protractorRect.left + 480,
                y: protractorRect.top + 480
            };
            
            const centerDistance = Math.sqrt(
                Math.pow(drawingData.vertex.x - protractorCenter.x, 2) + 
                Math.pow(drawingData.vertex.y - protractorCenter.y, 2)
            );
            
            // 检查射线与基准线的对齐（放宽条件）
            const rayAngle = Math.atan2(
                drawingData.firstRay.y - drawingData.vertex.y,
                drawingData.firstRay.x - drawingData.vertex.x
            ) * 180 / Math.PI;
            
            // 考虑量角器的旋转
            const baselineAngle = currentRotation;
            const angleDiff = Math.abs(rayAngle - baselineAngle);
            const normalizedAngleDiff = Math.min(angleDiff, 360 - angleDiff);
            
            // 放宽对齐条件：中心点距离30像素内，角度差25度内
            if (centerDistance &lt; 30 &amp;&amp; normalizedAngleDiff &lt; 25) {
                drawingData.isEdgeAligned = true;
                drawingStep = 3;
                protractor.classList.add('edge-aligned');
                updateStepIndicator(4, 'Aligned! Click the &quot;Confirm alignment&quot; button to continue');
                
                // 显示对齐成功的视觉反馈
                showAlignmentSuccess();
                showEdgeSnapIndicator();
            } else {
                drawingData.isEdgeAligned = false;
                protractor.classList.remove('edge-aligned');
                updateStepIndicator(3, 'Move the protractor so that the center point coincides with the vertex of the angle, and align the ray with the edge of the protractor.');
            }
        }

        // 显示边缘吸附指示器
        function showEdgeSnapIndicator() {
            const canvas = document.getElementById('geometryCanvas');
            
            // 移除已存在的边缘指示器
            const existing = canvas.querySelector('.edge-snap-indicator');
            if (existing) existing.remove();
            
            // 获取量角器在画布中的位置
            const protractorRect = protractor.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            
            const centerX = protractorRect.left - canvasRect.left + 480;
            const centerY = protractorRect.top - canvasRect.top + 480;
            
            // 创建边缘指示器（绿色虚线）
            const indicator = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const radius = 460;
            const pathData = `M ${centerX - radius} ${centerY} A ${radius} ${radius} 0 0 1 ${centerX + radius} ${centerY}`;
            
            indicator.setAttribute('d', pathData);
            indicator.classList.add('edge-snap-indicator');
            indicator.setAttribute('transform', `rotate(${currentRotation} ${centerX} ${centerY})`);
            canvas.appendChild(indicator);
            
            // 3秒后自动消失
            setTimeout(() =&gt; {
                if (indicator.parentNode) {
                    indicator.remove();
                }
            }, 3000);
        }

        // 显示对齐成功反馈
        function showAlignmentSuccess() {
            const canvas = document.getElementById('geometryCanvas');
            
            // 创建绿色光效
            const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            glow.setAttribute('cx', drawingData.vertex.x);
            glow.setAttribute('cy', drawingData.vertex.y);
            glow.setAttribute('r', 20);
            glow.setAttribute('fill', 'none');
            glow.setAttribute('stroke', '#4caf50');
            glow.setAttribute('stroke-width', '3');
            glow.setAttribute('opacity', '0.8');
            canvas.appendChild(glow);
            
            // 动画效果
            let opacity = 0.8;
            let radius = 20;
            const animate = () =&gt; {
                opacity -= 0.02;
                radius += 1;
                glow.setAttribute('opacity', opacity);
                glow.setAttribute('r', radius);
                
                if (opacity &gt; 0) {
                    requestAnimationFrame(animate);
                } else {
                    glow.remove();
                }
            };
            animate();
        }

        // 停止拖拽
        function stopDragging() {
            isDragging = false;
            protractor.style.cursor = 'move';
        }

        // 旋转量角器
        function rotateProtractor(degrees) {
            currentRotation += degrees;
            updateProtractorTransform();
            if (currentMode === 'measure') {
                measureCurrentAngle();
            } else if (currentMode === 'draw' &amp;&amp; drawingStep === 2) {
                // 重新检查对齐状态
                checkAlignment();
            }
        }

        // 更新量角器变换
        function updateProtractorTransform() {
            protractor.style.transform = `rotate(${currentRotation}deg)`;
        }

        // 生成随机角（量角模式）
        function generateRandomAngle() {
            if (currentMode !== 'measure') return;
            
            clearAll();
            
            // 获取当前角度类型
            const currentType = angleTypes[currentTypeIndex];
            
            // 生成整数角度
            let angleDegree;
            if (currentType.type === 'right') {
                angleDegree = 90;
            } else {
                angleDegree = Math.floor(Math.random() * (currentType.range[1] - currentType.range[0] + 1)) + currentType.range[0];
            }
            
            // 更新计数
            currentTypeCount++;
            if (currentTypeCount &gt;= currentType.count) {
                currentTypeIndex = (currentTypeIndex + 1) % angleTypes.length;
                currentTypeCount = 0;
            }
            
            // 在屏幕中央生成角
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // 随机起始方向
            const startAngle = Math.random() * 2 * Math.PI;
            const endAngle = startAngle + (angleDegree * Math.PI / 180);
            
            // 计算角的两条边的端点
            const baseLength = linesExtended ? 200 : 120;
            
            const point1 = {
                x: centerX + Math.cos(startAngle) * baseLength,
                y: centerY + Math.sin(startAngle) * baseLength
            };
            
            const point2 = {
                x: centerX + Math.cos(endAngle) * baseLength,
                y: centerY + Math.sin(endAngle) * baseLength
            };
            
            // 绘制角
            drawAngle(centerX, centerY, point1, point2, angleDegree);
        }

        // 绘制角（量角模式）
        function drawAngle(vertexX, vertexY, point1, point2, degree) {
            const canvas = document.getElementById('geometryCanvas');
            
            // 绘制顶点
            const vertex = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            vertex.setAttribute('cx', vertexX);
            vertex.setAttribute('cy', vertexY);
            vertex.setAttribute('r', 6);
            vertex.classList.add('angle-vertex');
            vertex.setAttribute('data-type', 'vertex');
            canvas.appendChild(vertex);
            
            // 绘制角的两条边
            const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line1.setAttribute('x1', vertexX);
            line1.setAttribute('y1', vertexY);
            line1.setAttribute('x2', point1.x);
            line1.setAttribute('y2', point1.y);
            line1.classList.add('angle-line');
            line1.setAttribute('data-type', 'line');
            canvas.appendChild(line1);
            
            const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line2.setAttribute('x1', vertexX);
            line2.setAttribute('y1', vertexY);
            line2.setAttribute('x2', point2.x);
            line2.setAttribute('y2', point2.y);
            line2.classList.add('angle-line');
            line2.setAttribute('data-type', 'line');
            canvas.appendChild(line2);
            
            // 存储角度信息
            currentAngle = {
                vertex: { x: vertexX, y: vertexY },
                point1: point1,
                point2: point2,
                degree: degree,
                elements: [vertex, line1, line2]
            };
            
            measureCurrentAngle();
        }

        // 切换延长线（量角模式）
        function toggleExtendLines() {
            if (currentMode !== 'measure') return;
            
            linesExtended = !linesExtended;
            const btn = document.getElementById('extendLinesBtn');
            btn.textContent = linesExtended ? 'Shorten corner edges' : 'Extend corner edges';
            btn.classList.toggle('active', linesExtended);
            
            if (currentAngle) {
                // 重新绘制当前角
                const degree = currentAngle.degree;
                const vertex = currentAngle.vertex;
                
                // 清除当前角的元素
                currentAngle.elements.forEach(el =&gt; el.remove());
                
                // 重新计算边长
                const baseLength = linesExtended ? 200 : 120;
                
                // 重新计算角的方向
                const dir1 = {
                    x: currentAngle.point1.x - vertex.x,
                    y: currentAngle.point1.y - vertex.y
                };
                const dir2 = {
                    x: currentAngle.point2.x - vertex.x,
                    y: currentAngle.point2.y - vertex.y
                };
                
                const len1 = Math.sqrt(dir1.x * dir1.x + dir1.y * dir1.y);
                const len2 = Math.sqrt(dir2.x * dir2.x + dir2.y * dir2.y);
                
                const newPoint1 = {
                    x: vertex.x + (dir1.x / len1) * baseLength,
                    y: vertex.y + (dir1.y / len1) * baseLength
                };
                
                const newPoint2 = {
                    x: vertex.x + (dir2.x / len2) * baseLength,
                    y: vertex.y + (dir2.y / len2) * baseLength
                };
                
                drawAngle(vertex.x, vertex.y, newPoint1, newPoint2, degree);
            }
        }

        // 显示角度值（量角模式）
        function showAngleValue() {
            if (currentMode !== 'measure' || !currentAngle) return;
            
            // 移除已存在的角度显示
            const existing = document.querySelector('.angle-result');
            if (existing) existing.remove();
            
            // 创建角度显示元素
            const angleResult = document.createElement('div');
            angleResult.className = 'angle-result';
            angleResult.textContent = `${currentAngle.degree}&deg;`;
            
            // 定位在角的顶点附近
            angleResult.style.left = (currentAngle.vertex.x + 20) + 'px';
            angleResult.style.top = (currentAngle.vertex.y - 30) + 'px';
            
            document.body.appendChild(angleResult);
            
            // 3秒后自动消失
            setTimeout(() =&gt; {
                if (angleResult.parentNode) {
                    angleResult.remove();
                }
            }, 3000);
        }

        // 测量当前角度（量角模式）
        function measureCurrentAngle() {
            if (currentMode !== 'measure' || !currentAngle) {
                document.getElementById('angleDisplay').textContent = 'Angle: 0&deg;';
                return;
            }
            
            const protractorRect = protractor.getBoundingClientRect();
            const protractorCenter = {
                x: protractorRect.left + 480,
                y: protractorRect.top + 480
            };
            
            // 检查量角器是否接近角的顶点
            const distance = Math.sqrt(
                Math.pow(currentAngle.vertex.x - protractorCenter.x, 2) + 
                Math.pow(currentAngle.vertex.y - protractorCenter.y, 2)
            );
            
            if (distance &lt; 30) {
                document.getElementById('angleDisplay').textContent = `角度: ${currentAngle.degree}&deg;`;
            } else {
                document.getElementById('angleDisplay').textContent = 'Angle: Align the protractor with the vertex of the angle';
            }
        }

        // 检查自动吸附（量角模式）
        function checkSnapping(protractorX, protractorY) {
            if (!currentAngle) return;
            
            const snapDistance = 25;
            const distance = Math.sqrt(
                Math.pow(currentAngle.vertex.x - protractorX, 2) + 
                Math.pow(currentAngle.vertex.y - protractorY, 2)
            );
            
            if (distance &lt; snapDistance) {
                const newX = currentAngle.vertex.x - 480;
                const newY = currentAngle.vertex.y - 480;
                
                protractor.style.left = newX + 'px';
                protractor.style.top = newY + 'px';
                
                showSnapIndicator(currentAngle.vertex.x, currentAngle.vertex.y);
            }
        }

        // 显示吸附指示器
        function showSnapIndicator(x, y) {
            const canvas = document.getElementById('geometryCanvas');
            const existing = canvas.querySelector('.snap-indicator');
            if (existing) existing.remove();
            
            const indicator = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            indicator.setAttribute('cx', x);
            indicator.setAttribute('cy', y);
            indicator.setAttribute('r', 8);
            indicator.classList.add('snap-indicator');
            canvas.appendChild(indicator);
            
            setTimeout(() =&gt; {
                if (indicator.parentNode) {
                    indicator.remove();
                }
            }, 1000);
        }

        // 清除所有
        function clearAll() {
            const canvas = document.getElementById('geometryCanvas');
            const elements = canvas.querySelectorAll('[data-type]');
            elements.forEach(el =&gt; el.remove());
            
            const indicators = canvas.querySelectorAll('.snap-indicator, .edge-snap-indicator');
            indicators.forEach(el =&gt; el.remove());
            
            const angleResults = document.querySelectorAll('.angle-result');
            angleResults.forEach(el =&gt; el.remove());
            
            const hints = document.querySelectorAll('.click-anywhere-hint');
            hints.forEach(el =&gt; el.remove());
            
            currentAngle = null;
            document.getElementById('angleDisplay').textContent = 'Angle: 0&deg;';
            
            // 移除边缘对齐样式
            protractor.classList.remove('edge-aligned');
            
            // 移除页面点击状态
            document.getElementById('mainContainer').classList.remove('draw-mode-step5');
            
            if (currentMode === 'draw') {
                resetDrawing();
            }
        }

        // 添加鼠标按下事件监听器
        document.addEventListener('mousedown', function(e) {
            if (currentMode === 'draw' &amp;&amp; !protractor.contains(e.target) &amp;&amp; !e.target.closest('.controls') &amp;&amp; !e.target.closest('.mode-selector') &amp;&amp; !e.target.closest('.step-indicator')) {
                handleMouseDown(e);
            }
        });

        // 处理鼠标按下事件（用于拖拽画线）
        function handleMouseDown(e) {
            if (currentMode !== 'draw') return;

            const rect = document.getElementById('geometryCanvas').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (drawingStep === 1 &amp;&amp; drawingData.vertex) {
                // 步骤2：开始画第一条射线
                drawingData.isDrawingFirstRay = true;
                updateStepIndicator(2, 'Hold down the left mouse button and drag to draw the first ray');
            }
        }

        // 触摸设备支持
        protractor.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                selectProtractor();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', {
                    clientX: touch.clientX,
                    clientY: touch.clientY,
                    button: 0
                });
                startDragging(mouseEvent);
            }
        });

        document.addEventListener('touchmove', function(e) {
            if (isDragging &amp;&amp; e.touches.length === 1) {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                handleMouseMove(mouseEvent);
            }
        });

        document.addEventListener('touchend', function(e) {
            if (isDragging) {
                stopDragging();
            }
        });

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
