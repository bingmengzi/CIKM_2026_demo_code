<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Banker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f4f8;
      font-family: "Microsoft YaHei", sans-serif;
    }

    #app-container {
      width: 1920px;
      height: 1080px;
      background: #fff;
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: top left;
      overflow: hidden;
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

  /* Shared component styles */
    .activity-header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      z-index: 10;
    }

    .back-btn {
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 18px;
    }

    .back-btn:hover {
      background: white;
      color: #667eea;
    }

    .progress {
      font-size: 24px;
      font-weight: bold;
    }

    .activity-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: auto;
    }

    .activity-footer {
      height: 80px;
      min-height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .next-btn {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      border: none;
      color: white;
      padding: 15px 50px;
      border-radius: 30px;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .next-btn:hover {
      transform: scale(1.05);
    }

    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

  /* Feedback animations */
    @keyframes correct-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @keyframes wrong-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-10px);
      }

      75% {
        transform: translateX(10px);
      }
    }

    .feedback-correct {
      animation: correct-pulse 0.5s;
    }

    .feedback-wrong {
      animation: wrong-shake 0.5s;
    }
  </style>
  <!-- Three.js for 3D Geometry Activities -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <div id="app-container">
    <div id="home-page" class="page active"></div>
    <div id="activity-1" class="page"></div>
    <div id="activity-2" class="page"></div>
    <div id="activity-3" class="page"></div>
  </div>
  <script>
  // ========== TeachingGameEngine (drag-and-drop engine) ==========
    class TeachingGameEngine {
      constructor() {
        this.draggables = [];
        this.dropZones = [];
        this.events = {};
        this.isMobile = 'ontouchstart' in window;
        this._initStyle();
      }
      makeDraggable(el, options = {}) {
        const element = this._getElement(el);
        if (!element) return;
        const config = { revert: true, targetGroup: 'default', ...options };
        const offsetParent = element.offsetParent || document.body;
        const parentRect = offsetParent.getBoundingClientRect();
        const rect = element.getBoundingClientRect();
        const computedStyle = window.getComputedStyle(element);
        if (computedStyle.position === 'static') {
          element.style.position = 'absolute';
          element.style.left = (rect.left - parentRect.left) + 'px';
          element.style.top = (rect.top - parentRect.top) + 'px';
        }
        config.initialX = parseFloat(element.style.left) || 0;
        config.initialY = parseFloat(element.style.top) || 0;
        config.zIndex = computedStyle.zIndex;
        this._bindDragEvents(element, config);
        element.style.cursor = 'grab';
        element.classList.add('tge-draggable');
      }
      makeDropZone(el, options = {}) {
        const element = this._getElement(el);
        if (!element) return;
        const config = { group: 'default', accept: null, ...options };
        element.classList.add('tge-dropzone');
        this.dropZones.push({ element, config });
      }
      playSound(type) { console.log(`[Audio] Playing ${type} sound`); }
      showFeedback(el, type = 'pulse') {
        const element = this._getElement(el);
        if (!element) return;
        element.classList.remove('tge-anim-shake', 'tge-anim-pulse');
        void element.offsetWidth;
        element.classList.add(`tge-anim-${type}`);
        setTimeout(() => element.classList.remove(`tge-anim-${type}`), 800);
      }
      on(eventName, callback) {
        if (!this.events[eventName]) this.events[eventName] = [];
        this.events[eventName].push(callback);
      }
      _getElement(el) { return typeof el === 'string' ? document.getElementById(el) : el; }
      _bindDragEvents(element, config) {
        let isDragging = false, startX, startY, initialLeft, initialTop;
        const self = this;
        const startHandler = (e) => {
          e.preventDefault();
          const point = self.isMobile ? e.touches[0] : e;
          isDragging = true; startX = point.clientX; startY = point.clientY;
          initialLeft = parseFloat(element.style.left) || 0;
          initialTop = parseFloat(element.style.top) || 0;
          element.style.zIndex = 1000; element.style.cursor = 'grabbing';
          element.classList.add('tge-dragging');
          self._emit('dragStart', { element });
        };
        const moveHandler = (e) => {
          if (!isDragging) return; e.preventDefault();
          const point = self.isMobile ? e.touches[0] : e;
          element.style.left = `${initialLeft + point.clientX - startX}px`;
          element.style.top = `${initialTop + point.clientY - startY}px`;
          self._checkDropZones(element, config);
        };
        const endHandler = (e) => {
          if (!isDragging) return; isDragging = false;
          element.style.zIndex = config.zIndex; element.style.cursor = 'grab';
          element.classList.remove('tge-dragging');
          const dropZone = self._checkDropZones(element, config);
          if (dropZone) { self._emit('drop', { source: element, target: dropZone.element }); self._snapTo(element, dropZone.element); }
          else { if (config.revert) self._revert(element, config); self._emit('dragEnd', { element, success: false }); }
          self.dropZones.forEach(z => z.element.classList.remove('tge-drag-over'));
        };
        if (this.isMobile) { element.addEventListener('touchstart', startHandler, { passive: false }); window.addEventListener('touchmove', moveHandler, { passive: false }); window.addEventListener('touchend', endHandler); }
        else { element.addEventListener('mousedown', startHandler); window.addEventListener('mousemove', moveHandler); window.addEventListener('mouseup', endHandler); }
      }
      _checkDropZones(dragEl, dragConfig) {
        let bestZone = null, maxArea = 0; const dragRect = dragEl.getBoundingClientRect();
        this.dropZones.forEach(zone => {
          if (zone.config.group !== dragConfig.targetGroup) return;
          const zoneRect = zone.element.getBoundingClientRect();
          const overlap = !(dragRect.right < zoneRect.left || dragRect.left > zoneRect.right || dragRect.bottom < zoneRect.top || dragRect.top > zoneRect.bottom);
          if (overlap) { const x_overlap = Math.max(0, Math.min(dragRect.right, zoneRect.right) - Math.max(dragRect.left, zoneRect.left)); const y_overlap = Math.max(0, Math.min(dragRect.bottom, zoneRect.bottom) - Math.max(dragRect.top, zoneRect.top)); const area = x_overlap * y_overlap; if (area > maxArea) { maxArea = area; bestZone = zone; } }
        });
        this.dropZones.forEach(z => z === bestZone ? z.element.classList.add('tge-drag-over') : z.element.classList.remove('tge-drag-over'));
        return bestZone;
      }
      _snapTo(dragEl, targetEl) { const offsetParent = dragEl.offsetParent || document.body; const parentRect = offsetParent.getBoundingClientRect(); const targetRect = targetEl.getBoundingClientRect(); const dragRect = dragEl.getBoundingClientRect(); const centerX = targetRect.left + targetRect.width / 2 - dragRect.width / 2 - parentRect.left; const centerY = targetRect.top + targetRect.height / 2 - dragRect.height / 2 - parentRect.top; dragEl.style.transition = 'all 0.3s ease-out'; dragEl.style.left = centerX + 'px'; dragEl.style.top = centerY + 'px'; setTimeout(() => dragEl.style.transition = '', 300); }
      _revert(element, config) { element.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; element.style.left = config.initialX + 'px'; element.style.top = config.initialY + 'px'; setTimeout(() => element.style.transition = '', 300); }
      _emit(name, data) { if (this.events[name]) this.events[name].forEach(cb => cb(data)); }
      _initStyle() { if (document.getElementById('tge-style')) return; const css = `.tge-draggable { touch-action: none; user-select: none; } .tge-drag-over { box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); transform: scale(1.02); transition: transform 0.2s; } .tge-anim-shake { animation: tge-shake 0.5s; } .tge-anim-pulse { animation: tge-pulse 0.5s; } @keyframes tge-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } } @keyframes tge-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }`; const style = document.createElement('style'); style.id = 'tge-style'; style.textContent = css; document.head.appendChild(style); }
      static Draggable = class {
        constructor(element, options = {}) { this.element = typeof element === 'string' ? document.getElementById(element) : element; this.options = { container: document.body, ...options }; this.isDragging = false; this.isMobile = 'ontouchstart' in window; this._bind(); }
        _bind() {
          const el = this.element; let startX, startY, elX, elY;
          const start = (e) => { e.preventDefault(); const pt = this.isMobile ? e.touches[0] : e; this.isDragging = true; startX = pt.clientX; startY = pt.clientY; elX = parseFloat(el.style.left) || 0; elY = parseFloat(el.style.top) || 0; if (this.options.onDragStart) this.options.onDragStart(e); };
          const move = (e) => { if (!this.isDragging) return; e.preventDefault(); const pt = this.isMobile ? e.touches[0] : e; el.style.left = (elX + pt.clientX - startX) + 'px'; el.style.top = (elY + pt.clientY - startY) + 'px'; };
          const end = (e) => { if (!this.isDragging) return; this.isDragging = false; if (this.options.onDragEnd) this.options.onDragEnd(e); };
          if (this.isMobile) { el.addEventListener('touchstart', start, { passive: false }); window.addEventListener('touchmove', move, { passive: false }); window.addEventListener('touchend', end); }
          else { el.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end); }
        }
        destroy() { }
      };
    }
    window.TeachingGameEngine = TeachingGameEngine;
    window.gameEngine = new TeachingGameEngine();

  // Responsive scaling
    function resizeApp() {
      const c = document.getElementById('app-container');
      const scaleX = window.innerWidth / 1920;
      const scaleY = window.innerHeight / 1080;
      const scale = Math.min(scaleX, scaleY);
      // Compute scaled size
      const scaledWidth = 1920 * scale;
      const scaledHeight = 1080 * scale;
      // Compute center offset
      const offsetX = (window.innerWidth - scaledWidth) / 2;
      const offsetY = (window.innerHeight - scaledHeight) / 2;
      // Apply transform: position to center first, then scale
      c.style.left = offsetX + 'px';
      c.style.top = offsetY + 'px';
      c.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeApp);
    resizeApp();

    // Activity manager
    const ActivityManager = {
      current: null,
      // Components to wait for (filled when components register)
      _requiredComponents: [],

      async show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if (this.current && window[`ACTIVITY_${this.current}`]?.destroy) {
          window[`ACTIVITY_${this.current}`].destroy();
        }
        if (id === 0) {
          document.getElementById('home-page').classList.add('active');
          if (window.HOME_PAGE) HOME_PAGE.init();
          this.current = null;
        } else {
          document.getElementById(`activity-${id}`).classList.add('active');
          const activity = window[`ACTIVITY_${id}`];
          if (activity) {
            // Wait for all required components to be registered
            await this._waitForComponents();
            activity.init();
          }
          this.current = id;
        }
      },

      // Wait for all registered components to be ready
      async _waitForComponents() {
        if (this._requiredComponents.length === 0) return;
        const promises = this._requiredComponents.map(name =>
          customElements.whenDefined(name).catch(() => { })
        );
        await Promise.all(promises);
      },

      // Register a component to wait for (called by component scripts)
      registerComponent(tagName) {
        if (!this._requiredComponents.includes(tagName)) {
          this._requiredComponents.push(tagName);
        }
      },

      goHome() { this.show(0); }
    };
  window.ActivityManager = ActivityManager;  // Expose on window for LLM-generated code

  // Utility helpers
    function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        if (type === 'correct') {
          osc.frequency.setValueAtTime(523, ctx.currentTime);
          osc.frequency.setValueAtTime(784, ctx.currentTime + 0.15);
        } else {
          osc.frequency.setValueAtTime(200, ctx.currentTime);
        }
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) { }
    }

    /**
     * Create an activity header (includes a Home button)
     * @param {string} title - Activity title
     * @param {string} progressText - Progress text (optional), e.g. "1/5"
     * @returns {string} HTML string
     */
    function createActivityHeader(title, progressText = '') {
      return `
        <div class="activity-header">
          <button class="back-btn" onclick="ActivityManager.goHome()">🏠 Home</button>
          <h2 style="font-size: 28px; margin: 0;">${title}</h2>
          <div class="progress">${progressText}</div>
        </div>
      `;
    }
    window.createActivityHeader = createActivityHeader;

    // ========== 3D geometry helper (built-in) ==========
    // For 3D geometry activities. Supports: cuboid, cube, sphere, cylinder, cone, frustum, prism, pyramid
    const Geometry3DHelper = {
      // Supported types and default parameters
      TYPES: {
        cuboid: { l: 4, w: 6, h: 3 },
        cube: { size: 4 },
        sphere: { radius: 3 },
        cylinder: { radiusTop: 2, radiusBottom: 2, height: 5 },
        cone: { radius: 2, height: 5 },
        frustum: { radiusTop: 1, radiusBottom: 2.5, height: 4 },
        prism: { sides: 6, radius: 2, height: 4 },
        pyramid: { sides: 4, radius: 2, height: 5 }
      },

      /**
  * Create a 3D solid renderer
  * @param {HTMLElement} container - Container element
  * @param {string} type - Type: cuboid/cube/sphere/cylinder/cone/frustum/prism/pyramid
  * @param {object} params - Parameter object
  * @param {object} options - Optional config { autoRotate, showEdges }
  * @returns {object} Controller { updateParams, setType, dispose }
       */
      create(container, type = 'cuboid', params = null, options = {}) {
        const self = {
          scene: null, camera: null, renderer: null,
          mesh: null, edges: null, edgeLines: null, geometry: null,
          currentType: type,
          currentParams: params || { ...this.TYPES[type] },
          options: { autoRotate: true, showEdges: true, ...options },
          boxMaterials: null
        };

  // Initialize scene
        const width = container.clientWidth || 600;
        const height = container.clientHeight || 400;

        self.scene = new THREE.Scene();
        self.scene.background = new THREE.Color(0xe8f4f8);

        self.camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        self.camera.position.set(12, 9, 15);
        self.camera.lookAt(0, 0, 0);

        self.renderer = new THREE.WebGLRenderer({ antialias: true });
        self.renderer.setSize(width, height);
        self.renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(self.renderer.domElement);

  // Lighting
        self.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        self.scene.add(dirLight);

  // Materials
        self.boxMaterials = [
          new THREE.MeshLambertMaterial({ color: 0xe74c3c }),
          new THREE.MeshLambertMaterial({ color: 0xe74c3c }),
          new THREE.MeshLambertMaterial({ color: 0x2ecc71 }),
          new THREE.MeshLambertMaterial({ color: 0x2ecc71 }),
          new THREE.MeshLambertMaterial({ color: 0x3498db }),
          new THREE.MeshLambertMaterial({ color: 0x3498db })
        ];

  // Create geometry
        const createGeometry = () => {
          if (self.mesh) { self.scene.remove(self.mesh); self.geometry.dispose(); }
          if (self.edgeLines) { self.scene.remove(self.edgeLines); self.edges.dispose(); }

          const p = self.currentParams;
          switch (self.currentType) {
            case 'cube': self.geometry = new THREE.BoxGeometry(p.size, p.size, p.size); break;
            case 'cuboid': self.geometry = new THREE.BoxGeometry(p.w, p.h, p.l); break;
            case 'sphere': self.geometry = new THREE.SphereGeometry(p.radius, 32, 24); break;
            case 'cylinder': self.geometry = new THREE.CylinderGeometry(p.radiusTop, p.radiusBottom, p.height, 32); break;
            case 'cone': self.geometry = new THREE.ConeGeometry(p.radius, p.height, 32); break;
            case 'frustum': self.geometry = new THREE.CylinderGeometry(p.radiusTop, p.radiusBottom, p.height, 32); break;
            case 'prism': self.geometry = new THREE.CylinderGeometry(p.radius, p.radius, p.height, p.sides); break;
            case 'pyramid': self.geometry = new THREE.ConeGeometry(p.radius, p.height, p.sides); self.geometry.rotateY(Math.PI / p.sides); break;
            default: self.geometry = new THREE.BoxGeometry(3, 3, 3);
          }

          const mat = (self.currentType === 'cuboid' || self.currentType === 'cube') ? self.boxMaterials : new THREE.MeshLambertMaterial({ color: 0x3498db });
          self.mesh = new THREE.Mesh(self.geometry, mat);
          self.scene.add(self.mesh);

          if (self.options.showEdges) {
            self.edges = new THREE.EdgesGeometry(self.geometry, 15);
            self.edgeLines = new THREE.LineSegments(self.edges, new THREE.LineBasicMaterial({ color: 0x333333 }));
            self.scene.add(self.edgeLines);
          }
        };
        createGeometry();

  // Animation loop
        let animId;
        const animate = () => {
          animId = requestAnimationFrame(animate);
          if (self.options.autoRotate && self.mesh) {
            self.mesh.rotation.y += 0.005;
            if (self.edgeLines) self.edgeLines.rotation.y += 0.005;
          }
          self.renderer.render(self.scene, self.camera);
        };
        animate();

  // Return controller
        return {
          updateParams(newParams) {
            self.currentParams = { ...self.currentParams, ...newParams };
            createGeometry();
          },
          setType(newType, newParams) {
            self.currentType = newType;
            self.currentParams = newParams || { ...Geometry3DHelper.TYPES[newType] };
            createGeometry();
          },
          isCube() {
            if (self.currentType === 'cube') return true;
            if (self.currentType === 'cuboid') {
              const { l, w, h } = self.currentParams;
              return l === w && w === h;
            }
            return false;
          },
          dispose() {
            cancelAnimationFrame(animId);
            if (self.geometry) self.geometry.dispose();
            if (self.edges) self.edges.dispose();
            self.boxMaterials.forEach(m => m.dispose());
            self.renderer.dispose();
            const canvas = self.renderer.domElement;
            if (canvas && canvas.parentNode) canvas.parentNode.removeChild(canvas);
          }
        };
      }
    };

    // ========== Area for LLM-generated code ==========
    window.HOME_PAGE = {
      template: `
    <style>
      /* Global reset and fonts */
      .hp-container {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
        background: url('./assets/background.png') center center / cover no-repeat;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #333;
      }

  /* Overlay layer to improve text readability */
      .hp-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(2px);
        z-index: 0;
      }

  /* Content area */
      .hp-content {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1600px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

  /* Title styles */
      .hp-header {
        text-align: center;
        margin-bottom: 60px;
        animation: slideDown 0.8s ease-out;
      }

      .hp-title {
        font-size: 84px;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to right, #FF512F, #DD2476);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        letter-spacing: 4px;
      }

      .hp-subtitle {
        font-size: 32px;
        color: #555;
        background-color: rgba(255,255,255,0.8);
        padding: 5px 20px;
        border-radius: 20px;
        margin-top: 10px;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

  /* Cards container */
      .hp-cards-wrapper {
        display: flex;
        gap: 40px;
        justify-content: center;
        width: 100%;
        padding: 0 20px;
      }

  /* Individual card styles */
      .hp-card {
        width: 380px;
        height: 450px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
        overflow: hidden;
        border: 4px solid transparent;
        animation: fadeInUp 0.8s ease-out backwards;
      }

  /* Card hover effect */
      .hp-card:hover {
        transform: translateY(-15px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        background: #fff;
        border-color: #FF9A9E;
      }

  /* Card icon area */
      .hp-card-icon {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        margin-bottom: 30px;
        background: #f0f4f8;
        transition: transform 0.3s;
      }
      
      .hp-card:hover .hp-card-icon {
        transform: rotate(10deg) scale(1.1);

      setupDragDrop() {
        const itemEl = document.getElementById('current-item-1');
        const bins = [
          document.getElementById('target-yuan'),

          document.getElementById('target-fen')
        ];

        });

        });

        // Listen to global engine events for this activity

          this._hasBoundEngineEvents = true;

            if (element.id !== 'current-item-1') return;

            element.style.zIndex = 100;
          });

        }

      isOverlapping(rect1, rect2) {
        // Simple rectangle overlap check with a bit of tolerance (center-point check)
        const center1X = rect1.left + rect1.width / 2;
        const center1Y = rect1.top + rect1.height / 2;

        return center1X > rect2.left && center1X < rect2.right &&
          center1Y > rect2.top && center1Y < rect2.bottom;
      },

      checkAnswer(binEl, itemEl) {
        if (this.state.isAnimating) return;

        const targetUnit = binEl.dataset.unit;
        const itemUnit = itemEl.dataset.unit;

        if (targetUnit === itemUnit) {
          // Correct
          this.handleCorrect(binEl, itemEl);

  // 1. Fly-in animation

  const binRect = binEl.querySelector('img').getBoundingClientRect(); // fly toward the image center

  // Create a clone for animation
        const clone = itemEl.cloneNode(true);
        clone.style.position = 'fixed';
        clone.style.left = itemRect.left + 'px';
        clone.style.top = itemRect.top + 'px';
        clone.style.width = itemRect.width + 'px';
        clone.style.height = itemRect.height + 'px';
        clone.style.zIndex = 1000;
        clone.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
        clone.style.pointerEvents = 'none'; // let events pass through
        document.body.appendChild(clone);

        // Hide the original element
        itemEl.style.visibility = 'hidden';

        // Run the animation
        requestAnimationFrame(() => {
          // Compute target position (piggy bank center)
          const targetX = binRect.left + binRect.width / 2 - itemRect.width / 2;
          const targetY = binRect.top + binRect.height / 2 - itemRect.height / 2;

          clone.style.left = targetX + 'px';
          clone.style.top = targetY + 'px';
          clone.style.transform = 'scale(0.3) rotate(360deg)';
          clone.style.opacity = '0';
        });

  // Clean up after the animation
        setTimeout(() => {
          clone.remove();
          this.state.currentQuestionIndex++;
          this.state.isAnimating = false; // Reset lock
          setTimeout(() => this.loadQuestion(), 500);
        }, 600);

          items: this.getMoneyItems(totalJiao)
        };

        // 构建错误选项 (生成2个)
        const options = [correctOption];
        while (options.length < 3) {
          // 干扰项逻辑：总额接近但不同
          let offset = Math.floor(Math.random() * 5) + 1; // 1-5角偏差
          offset = Math.random() > 0.5 ? offset : -offset;

          let wrongValue = totalJiao + offset;

          // 边界检查
          if (wrongValue <= 0) wrongValue = totalJiao + 2;
          if (wrongValue === totalJiao) wrongValue = totalJiao + 1; // 防止意外重复

          // 检查是否已存在该金额的选项
          const exists = options.some(opt => opt.value === wrongValue);
          if (!exists) {
            options.push({
              value: wrongValue,
              items: this.getMoneyItems(wrongValue)
            });
          }
        }

        // 打乱选项顺序
        options.sort(() => Math.random() - 0.5);

        // 构造文字描述
        let text = "";
        if (yuan > 0) text += `${yuan}yuan`;
        if (jiao > 0) text += `${jiao}jiao`;
        // if (yuan > 0 && jiao === 0) text += "整";

        return {
          text: text,
          targetValue: totalJiao,
          options: options,
          correctIndex: options.findIndex(o => o.value === totalJiao)
        };
      },

      // 辅助：根据总金额(角)返回钱币图片列表
      getMoneyItems(totalJiao) {
        const items = [];
        let remaining = totalJiao;

        // 5元 (50角)
        const count5Yuan = Math.floor(remaining / 50);
        for (let i = 0; i < count5Yuan; i++) items.push({ type: 'bill', src: this.config.assets.bill_5_yuan });
        remaining %= 50;

        // 1元 (10角)
        const count1Yuan = Math.floor(remaining / 10);
        for (let i = 0; i < count1Yuan; i++) {
          // 随机使用纸币或硬币
          const useCoin = Math.random() > 0.5;
          items.push({
            type: useCoin ? 'coin' : 'bill',
            src: useCoin ? this.config.assets.coin_1_yuan : this.config.assets.bill_1_yuan
          });
        }
        remaining %= 10;

        // 5角 (5角)
        const count5Jiao = Math.floor(remaining / 5);
        for (let i = 0; i < count5Jiao; i++) items.push({ type: 'coin', src: this.config.assets.coin_5_jiao });
        remaining %= 5;

        // 1角 (1角)
        for (let i = 0; i < remaining; i++) items.push({ type: 'coin', src: this.config.assets.coin_1_jiao });

        return items;
      },

      renderQuestion() {
        const data = this.state.currentQuestionData;

        // 设置目标文本
        document.getElementById('target-text-2').innerText = data.text;

        // 生成选项HTML
        const container = document.getElementById('options-container-2');
        container.innerHTML = '';

        data.options.forEach((opt, idx) => {
          const tray = document.createElement('div');
          tray.className = 'tray-option';

          // 填充钱币图片

          tray.appendChild(feedbackIcon);

          // 绑定点击
          tray.onclick = () => this.checkAnswer(idx, tray, feedbackIcon);

          container.appendChild(tray);

        if (!this.state.isAnswering) return;
        this.state.isAnswering = false;

        const isCorrect = selectedIndex === this.state.currentQuestionData.correctIndex;

      init() {

          const div = document.createElement('div');
          div.className = `money-source ${m.type}`;
          div.setAttribute('data-val', m.val);
          div.setAttribute('data-img', this.config.assets[m.img]);
          div.setAttribute('data-type', m.type);

          const img = document.createElement('img');
          img.src = this.config.assets[m.img];
          div.appendChild(img);

          walletEl.appendChild(div);
        });

        // Initialize Drag & Drop - Delay to ensure layout is computed
        setTimeout(() => {
          this.initDragDrop();
        }, 200);

        // Load first question
        this.loadQuestion(0);
      },

      initDragDrop() {
        const moneyItems = document.querySelectorAll('#wallet-3 .money-source');
        const counterZone = document.getElementById('counter-zone-3');
        const counterSurface = document.getElementById('counter-surface-3');

        // Register Drop Zone
        window.gameEngine.makeDropZone(counterZone, { group: 'money' });

        // Register Draggables
        moneyItems.forEach(item => {
          window.gameEngine.makeDraggable(item, {
            revert: true,
            targetGroup: 'money'
          });
        });

        // Handle Events
        window.gameEngine.on('enter', ({ target }) => {
          if (target === counterZone) {
            counterSurface.classList.add('highlight');
          }
        });

        window.gameEngine.on('leave', ({ target }) => {
          if (target === counterZone) {
            counterSurface.classList.remove('highlight');
          }
        });

        window.gameEngine.on('drop', ({ source, target }) => {
          counterSurface.classList.remove('highlight');
          if (target === counterZone) {
            const val = parseFloat(source.getAttribute('data-val'));
            const imgSrc = source.getAttribute('data-img');
            const type = source.getAttribute('data-type');

            // 1. Create visualization clone BEFORE hiding source
            // We use the same PlayFlyAnimation but maybe we pass it the relevant info or element
            // We need to capture the rect BEFORE we reset it
            const rect = source.getBoundingClientRect();

            // 2. Hide source immediately so it doesn't look like it's sticking to the counter
            source.style.opacity = '0';

            // 3. Reset source to allow it to return to wallet (Infinite Source effect)
            // We wait a tick to override any engine-applied snap changes
            setTimeout(() => {
              source.style.position = '';
              source.style.left = '';
              source.style.top = '';
              source.style.zIndex = '';
              source.style.transform = '';
              // Restore visibility (only after validation or just always?)
              // Actually we want "Infinite Source", so we always restore it.
              source.style.opacity = '1';
              source.classList.remove('tge-dragging');
            }, 50);

            // 4. Play Animation & Logic
            this.playFlyAnimation(source, target, () => {
              this.addMoneyToCounter(val, imgSrc, type);
            });

            window.gameEngine.playSound('click');
          }
        });
      },

      playFlyAnimation(sourceEl, targetEl, onComplete) {
        const rect = sourceEl.getBoundingClientRect();

        // Clone the source element directly
        const clone = sourceEl.cloneNode(true);
        // Reset specific styles on the clone to ensure it renders "cleanly" for animation
        clone.style.position = 'fixed';
        clone.style.left = rect.left + 'px';
        clone.style.top = rect.top + 'px';
        clone.style.width = rect.width + 'px';
        clone.style.height = rect.height + 'px';
        clone.style.zIndex = '100';
        clone.style.opacity = '1'; // Ensure visible even if source was hidden
        clone.style.transition = 'all 0.5s ease-out';
        clone.style.margin = '0';
        clone.style.pointerEvents = 'none';

        document.body.appendChild(clone);

        // Random position within paid area
        const paidArea = document.getElementById('paid-area-3').getBoundingClientRect();
        const targetX = paidArea.left + paidArea.width / 2 - rect.width / 2;
        const targetY = paidArea.top + paidArea.height / 2 - rect.height / 2;

        requestAnimationFrame(() => {
          clone.style.left = targetX + 'px';
          clone.style.top = targetY + 'px';
          clone.style.transform = 'scale(0.8)';
          clone.style.opacity = '0.5';
        });

        setTimeout(() => {
          clone.remove();
          onComplete();
        }, 500);
      },

      addMoneyToCounter(val, imgSrc, type) {
        this.state.paidItems.push({
          val: val,
          id: Date.now() + Math.random(),
          img: imgSrc,
          type: type
        });
        this._recalcTotal();
        this.renderPaidItems();
      },

      removeMoneyFromCounter(index) {
        this.state.paidItems.splice(index, 1);
        this._recalcTotal();
        window.gameEngine.playSound('click');
        this.renderPaidItems();
      },

      _recalcTotal() {
        const sum = this.state.paidItems.reduce((acc, item) => acc + item.val, 0);
        this.state.currentPaid = Math.round(sum * 100) / 100; // Fix floating point
      },

      renderPaidItems() {
        const container = document.getElementById('paid-area-3');
        container.innerHTML = '';

        this.state.paidItems.forEach((item, index) => {
          const img = document.createElement('img');
          img.src = item.img;
          img.className = `paid-item ${item.type}`;
          img.title = "Click to retrieve"; // Add tooltip hint
          img.onclick = () => this.removeMoneyFromCounter(index);
          container.appendChild(img);
        });

        // Update Total Display
        const totalDisplay = document.getElementById('total-display-3');
        if (this.state.currentPaid > 0.01) {
          totalDisplay.style.display = 'block';
          // Format: Remove .0 if integer, keep .X if not
          const displayVal = Math.abs(this.state.currentPaid - Math.round(this.state.currentPaid)) < 0.01
            ? Math.round(this.state.currentPaid)
            : this.state.currentPaid.toFixed(1);

          // Convert to Chinese units logic nicely
          let text = "";
          const yuan = Math.floor(this.state.currentPaid + 0.001);
          const jiao = Math.round((this.state.currentPaid - yuan) * 10);

          if (jiao === 0) text = `${yuan}yuan`;
          else if (yuan === 0) text = `${jiao}jiao`;
          else text = `${yuan}yuan${jiao}jiao`;

          totalDisplay.innerText = "Now: " + text;
        } else {
          totalDisplay.style.display = 'none';
        }
      },

      loadQuestion(index) {

        this.state.currentIndex = index;

        // Update Product
        document.getElementById('product-img-3').src = this.config.assets[q.imgKey];
        document.getElementById('price-text-3').innerText = q.price_text;
      },

      checkAnswer() {

        const diff = Math.abs(this.state.currentPaid - q.price_val);

        if (diff < 0.01) {
          window.gameEngine.playSound('success');

          setTimeout(() => hint.remove(), 1500);
        }
      },

      nextQuestion() {
        this.loadQuestion(this.state.currentIndex + 1);

      showResult() {
        const container = document.querySelector('.activity-content');
