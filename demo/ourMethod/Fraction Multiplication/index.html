<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraction Multiplication Lab: Area Model</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f4f8;
      font-family: "Microsoft YaHei", sans-serif;
    }

    #app-container {
      width: 1920px;
      height: 1080px;
      background: #fff;
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: top left;
      overflow: hidden;
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

  /* Shared component styles */
    .activity-header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      z-index: 10;
    }

    .back-btn {
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 18px;
    }

    .back-btn:hover {
      background: white;
      color: #667eea;
    }

    .progress {
      font-size: 24px;
      font-weight: bold;
    }

    .activity-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: auto;
    }

    .activity-footer {
      height: 80px;
      min-height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .next-btn {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      border: none;
      color: white;
      padding: 15px 50px;
      border-radius: 30px;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .next-btn:hover {
      transform: scale(1.05);
    }

    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

  /* Feedback animations */
    @keyframes correct-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @keyframes wrong-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-10px);
      }

      75% {
        transform: translateX(10px);
      }
    }

    .feedback-correct {
      animation: correct-pulse 0.5s;
    }

    .feedback-wrong {
      animation: wrong-shake 0.5s;
    }
  </style>
  <!-- Three.js for 3D Geometry Activities -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <div id="app-container">
    <div id="home-page" class="page active"></div>
    <div id="activity-1" class="page"></div>
    <div id="activity-2" class="page"></div>
    <div id="activity-3" class="page"></div>
  </div>
  <script>
  // ========== TeachingGameEngine (drag-and-drop engine) ==========
    class TeachingGameEngine {
      constructor() {
        this.draggables = [];
        this.dropZones = [];
        this.events = {};
        this.isMobile = 'ontouchstart' in window;
        this._initStyle();
      }
      makeDraggable(el, options = {}) {
        const element = this._getElement(el);
        if (!element) return;
        const config = { revert: true, targetGroup: 'default', ...options };
        const offsetParent = element.offsetParent || document.body;
        const parentRect = offsetParent.getBoundingClientRect();
        const rect = element.getBoundingClientRect();
        const computedStyle = window.getComputedStyle(element);
        if (computedStyle.position === 'static') {
          element.style.position = 'absolute';
          element.style.left = (rect.left - parentRect.left) + 'px';
          element.style.top = (rect.top - parentRect.top) + 'px';
        }
        config.initialX = parseFloat(element.style.left) || 0;
        config.initialY = parseFloat(element.style.top) || 0;
        config.zIndex = computedStyle.zIndex;
        this._bindDragEvents(element, config);
        element.style.cursor = 'grab';
        element.classList.add('tge-draggable');
      }
      makeDropZone(el, options = {}) {
        const element = this._getElement(el);
        if (!element) return;
        const config = { group: 'default', accept: null, ...options };
        element.classList.add('tge-dropzone');
        this.dropZones.push({ element, config });
      }
      playSound(type) { console.log(`[Audio] Playing ${type} sound`); }
      showFeedback(el, type = 'pulse') {
        const element = this._getElement(el);
        if (!element) return;
        element.classList.remove('tge-anim-shake', 'tge-anim-pulse');
        void element.offsetWidth;
        element.classList.add(`tge-anim-${type}`);
        setTimeout(() => element.classList.remove(`tge-anim-${type}`), 800);
      }
      on(eventName, callback) {
        if (!this.events[eventName]) this.events[eventName] = [];
        this.events[eventName].push(callback);
      }
      _getElement(el) { return typeof el === 'string' ? document.getElementById(el) : el; }
      _bindDragEvents(element, config) {
        let isDragging = false, startX, startY, initialLeft, initialTop;
        const self = this;
        const startHandler = (e) => {
          e.preventDefault();
          const point = self.isMobile ? e.touches[0] : e;
          isDragging = true; startX = point.clientX; startY = point.clientY;
          initialLeft = parseFloat(element.style.left) || 0;
          initialTop = parseFloat(element.style.top) || 0;
          element.style.zIndex = 1000; element.style.cursor = 'grabbing';
          element.classList.add('tge-dragging');
          self._emit('dragStart', { element });
        };
        const moveHandler = (e) => {
          if (!isDragging) return; e.preventDefault();
          const point = self.isMobile ? e.touches[0] : e;
          element.style.left = `${initialLeft + point.clientX - startX}px`;
          element.style.top = `${initialTop + point.clientY - startY}px`;
          self._checkDropZones(element, config);
        };
        const endHandler = (e) => {
          if (!isDragging) return; isDragging = false;
          element.style.zIndex = config.zIndex; element.style.cursor = 'grab';
          element.classList.remove('tge-dragging');
          const dropZone = self._checkDropZones(element, config);
          if (dropZone) { self._emit('drop', { source: element, target: dropZone.element }); self._snapTo(element, dropZone.element); }
          else { if (config.revert) self._revert(element, config); self._emit('dragEnd', { element, success: false }); }
          self.dropZones.forEach(z => z.element.classList.remove('tge-drag-over'));
        };
        if (this.isMobile) { element.addEventListener('touchstart', startHandler, { passive: false }); window.addEventListener('touchmove', moveHandler, { passive: false }); window.addEventListener('touchend', endHandler); }
        else { element.addEventListener('mousedown', startHandler); window.addEventListener('mousemove', moveHandler); window.addEventListener('mouseup', endHandler); }
      }
      _checkDropZones(dragEl, dragConfig) {
        let bestZone = null, maxArea = 0; const dragRect = dragEl.getBoundingClientRect();
        this.dropZones.forEach(zone => {
          if (zone.config.group !== dragConfig.targetGroup) return;
          const zoneRect = zone.element.getBoundingClientRect();
          const overlap = !(dragRect.right < zoneRect.left || dragRect.left > zoneRect.right || dragRect.bottom < zoneRect.top || dragRect.top > zoneRect.bottom);
          if (overlap) { const x_overlap = Math.max(0, Math.min(dragRect.right, zoneRect.right) - Math.max(dragRect.left, zoneRect.left)); const y_overlap = Math.max(0, Math.min(dragRect.bottom, zoneRect.bottom) - Math.max(dragRect.top, zoneRect.top)); const area = x_overlap * y_overlap; if (area > maxArea) { maxArea = area; bestZone = zone; } }
        });
        this.dropZones.forEach(z => z === bestZone ? z.element.classList.add('tge-drag-over') : z.element.classList.remove('tge-drag-over'));
        return bestZone;
      }
      _snapTo(dragEl, targetEl) { const offsetParent = dragEl.offsetParent || document.body; const parentRect = offsetParent.getBoundingClientRect(); const targetRect = targetEl.getBoundingClientRect(); const dragRect = dragEl.getBoundingClientRect(); const centerX = targetRect.left + targetRect.width / 2 - dragRect.width / 2 - parentRect.left; const centerY = targetRect.top + targetRect.height / 2 - dragRect.height / 2 - parentRect.top; dragEl.style.transition = 'all 0.3s ease-out'; dragEl.style.left = centerX + 'px'; dragEl.style.top = centerY + 'px'; setTimeout(() => dragEl.style.transition = '', 300); }
      _revert(element, config) { element.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; element.style.left = config.initialX + 'px'; element.style.top = config.initialY + 'px'; setTimeout(() => element.style.transition = '', 300); }
      _emit(name, data) { if (this.events[name]) this.events[name].forEach(cb => cb(data)); }
      _initStyle() { if (document.getElementById('tge-style')) return; const css = `.tge-draggable { touch-action: none; user-select: none; } .tge-drag-over { box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); transform: scale(1.02); transition: transform 0.2s; } .tge-anim-shake { animation: tge-shake 0.5s; } .tge-anim-pulse { animation: tge-pulse 0.5s; } @keyframes tge-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } } @keyframes tge-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }`; const style = document.createElement('style'); style.id = 'tge-style'; style.textContent = css; document.head.appendChild(style); }
      static Draggable = class {
        constructor(element, options = {}) { this.element = typeof element === 'string' ? document.getElementById(element) : element; this.options = { container: document.body, ...options }; this.isDragging = false; this.isMobile = 'ontouchstart' in window; this._bind(); }
        _bind() {
          const el = this.element; let startX, startY, elX, elY;
          const start = (e) => { e.preventDefault(); const pt = this.isMobile ? e.touches[0] : e; this.isDragging = true; startX = pt.clientX; startY = pt.clientY; elX = parseFloat(el.style.left) || 0; elY = parseFloat(el.style.top) || 0; if (this.options.onDragStart) this.options.onDragStart(e); };
          const move = (e) => { if (!this.isDragging) return; e.preventDefault(); const pt = this.isMobile ? e.touches[0] : e; el.style.left = (elX + pt.clientX - startX) + 'px'; el.style.top = (elY + pt.clientY - startY) + 'px'; };
          const end = (e) => { if (!this.isDragging) return; this.isDragging = false; if (this.options.onDragEnd) this.options.onDragEnd(e); };
          if (this.isMobile) { el.addEventListener('touchstart', start, { passive: false }); window.addEventListener('touchmove', move, { passive: false }); window.addEventListener('touchend', end); }
          else { el.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end); }
        }
        destroy() { }
      };
    }
    window.TeachingGameEngine = TeachingGameEngine;
    window.gameEngine = new TeachingGameEngine();

  // Responsive scaling
    function resizeApp() {
      const c = document.getElementById('app-container');
      const scaleX = window.innerWidth / 1920;
      const scaleY = window.innerHeight / 1080;
      const scale = Math.min(scaleX, scaleY);
  // Compute scaled dimensions
      const scaledWidth = 1920 * scale;
      const scaledHeight = 1080 * scale;
  // Compute centering offsets
      const offsetX = (window.innerWidth - scaledWidth) / 2;
      const offsetY = (window.innerHeight - scaledHeight) / 2;
  // Apply transform: translate to center first, then scale
      c.style.left = offsetX + 'px';
      c.style.top = offsetY + 'px';
      c.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeApp);
    resizeApp();

  // Activity manager
    const ActivityManager = {
      current: null,
  // Components to wait for (filled by component registration)
      _requiredComponents: [],

      async show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if (this.current && window[`ACTIVITY_${this.current}`]?.destroy) {
          window[`ACTIVITY_${this.current}`].destroy();
        }
        if (id === 0) {
          document.getElementById('home-page').classList.add('active');
          if (window.HOME_PAGE) HOME_PAGE.init();
          this.current = null;
        } else {
          document.getElementById(`activity-${id}`).classList.add('active');
          const activity = window[`ACTIVITY_${id}`];
          if (activity) {
            // Wait for all components to finish registering
            await this._waitForComponents();
            activity.init();
          }
          this.current = id;
        }
      },

  // Wait for all registered components to be ready
      async _waitForComponents() {
        if (this._requiredComponents.length === 0) return;
        const promises = this._requiredComponents.map(name =>
          customElements.whenDefined(name).catch(() => { })
        );
        await Promise.all(promises);
      },

  // Register a component to wait for (called by component scripts)
      registerComponent(tagName) {
        if (!this._requiredComponents.includes(tagName)) {
          this._requiredComponents.push(tagName);
        }
      },

      goHome() { this.show(0); }
    };
  window.ActivityManager = ActivityManager;  // Expose on window for LLM-generated code to use

  // Utility helpers
    function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        if (type === 'correct') {
          osc.frequency.setValueAtTime(523, ctx.currentTime);
          osc.frequency.setValueAtTime(784, ctx.currentTime + 0.15);
        } else {
          osc.frequency.setValueAtTime(200, ctx.currentTime);
        }
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) { }
    }

    /**
  * Create an activity header (includes a Back/Home button)
  * @param {string} title - Activity title
  * @param {string} progressText - Progress text (optional), e.g. "1/5"
  * @returns {string} HTML string
     */
    function createActivityHeader(title, progressText = '') {
      return `
        <div class="activity-header">
          <button class="back-btn" onclick="ActivityManager.goHome()">🏠 Home</button>
          <h2 style="font-size: 28px; margin: 0;">${title}</h2>
          <div class="progress">${progressText}</div>
        </div>
      `;
    }
    window.createActivityHeader = createActivityHeader;

  // ========== 3D geometry helper (built-in) ==========
    // For 3D geometry activities. Supports: cuboid, cube, sphere, cylinder, cone, frustum, prism, pyramid
    const Geometry3DHelper = {
      // Supported types and default parameters
      TYPES: {
        cuboid: { l: 4, w: 6, h: 3 },
        cube: { size: 4 },
        sphere: { radius: 3 },
        cylinder: { radiusTop: 2, radiusBottom: 2, height: 5 },
        cone: { radius: 2, height: 5 },
        frustum: { radiusTop: 1, radiusBottom: 2.5, height: 4 },
        prism: { sides: 6, radius: 2, height: 4 },
        pyramid: { sides: 4, radius: 2, height: 5 }
      },

      /**
  * Create a 3D solid renderer
  * @param {HTMLElement} container - Container element
  * @param {string} type - Type: cuboid/cube/sphere/cylinder/cone/frustum/prism/pyramid
  * @param {object} params - Parameter object
  * @param {object} options - Optional config { autoRotate, showEdges }
  * @returns {object} Controller { updateParams, setType, dispose }
       */
      create(container, type = 'cuboid', params = null, options = {}) {
        const self = {
          scene: null, camera: null, renderer: null,
          mesh: null, edges: null, edgeLines: null, geometry: null,
          currentType: type,
          currentParams: params || { ...this.TYPES[type] },
          options: { autoRotate: true, showEdges: true, ...options },
          boxMaterials: null
        };

  // Initialize scene
        const width = container.clientWidth || 600;
        const height = container.clientHeight || 400;

        self.scene = new THREE.Scene();
        self.scene.background = new THREE.Color(0xe8f4f8);

        self.camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        self.camera.position.set(12, 9, 15);
        self.camera.lookAt(0, 0, 0);

        self.renderer = new THREE.WebGLRenderer({ antialias: true });
        self.renderer.setSize(width, height);
        self.renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(self.renderer.domElement);

  // Lighting
        self.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        self.scene.add(dirLight);

  // Materials
        self.boxMaterials = [
          new THREE.MeshLambertMaterial({ color: 0xe74c3c }),
          new THREE.MeshLambertMaterial({ color: 0xe74c3c }),
          new THREE.MeshLambertMaterial({ color: 0x2ecc71 }),
          new THREE.MeshLambertMaterial({ color: 0x2ecc71 }),
          new THREE.MeshLambertMaterial({ color: 0x3498db }),
          new THREE.MeshLambertMaterial({ color: 0x3498db })
        ];

  // Create geometry
        const createGeometry = () => {
          if (self.mesh) { self.scene.remove(self.mesh); self.geometry.dispose(); }
          if (self.edgeLines) { self.scene.remove(self.edgeLines); self.edges.dispose(); }

          const p = self.currentParams;
          switch (self.currentType) {
            case 'cube': self.geometry = new THREE.BoxGeometry(p.size, p.size, p.size); break;
            case 'cuboid': self.geometry = new THREE.BoxGeometry(p.w, p.h, p.l); break;
            case 'sphere': self.geometry = new THREE.SphereGeometry(p.radius, 32, 24); break;
            case 'cylinder': self.geometry = new THREE.CylinderGeometry(p.radiusTop, p.radiusBottom, p.height, 32); break;
            case 'cone': self.geometry = new THREE.ConeGeometry(p.radius, p.height, 32); break;
            case 'frustum': self.geometry = new THREE.CylinderGeometry(p.radiusTop, p.radiusBottom, p.height, 32); break;
            case 'prism': self.geometry = new THREE.CylinderGeometry(p.radius, p.radius, p.height, p.sides); break;
            case 'pyramid': self.geometry = new THREE.ConeGeometry(p.radius, p.height, p.sides); self.geometry.rotateY(Math.PI / p.sides); break;
            default: self.geometry = new THREE.BoxGeometry(3, 3, 3);
          }

          const mat = (self.currentType === 'cuboid' || self.currentType === 'cube') ? self.boxMaterials : new THREE.MeshLambertMaterial({ color: 0x3498db });
          self.mesh = new THREE.Mesh(self.geometry, mat);
          self.scene.add(self.mesh);

          if (self.options.showEdges) {
            self.edges = new THREE.EdgesGeometry(self.geometry, 15);
            self.edgeLines = new THREE.LineSegments(self.edges, new THREE.LineBasicMaterial({ color: 0x333333 }));
            self.scene.add(self.edgeLines);
          }
        };
        createGeometry();

  // Animation loop
        let animId;
        const animate = () => {
          animId = requestAnimationFrame(animate);
          if (self.options.autoRotate && self.mesh) {
            self.mesh.rotation.y += 0.005;
            if (self.edgeLines) self.edgeLines.rotation.y += 0.005;
          }
          self.renderer.render(self.scene, self.camera);
        };
        animate();

  // Return controller
        return {
          updateParams(newParams) {
            self.currentParams = { ...self.currentParams, ...newParams };
            createGeometry();
          },
          setType(newType, newParams) {
            self.currentType = newType;
            self.currentParams = newParams || { ...Geometry3DHelper.TYPES[newType] };
            createGeometry();
          },
          isCube() {
            if (self.currentType === 'cube') return true;
            if (self.currentType === 'cuboid') {
              const { l, w, h } = self.currentParams;
              return l === w && w === h;
            }
            return false;
          },
          dispose() {
            cancelAnimationFrame(animId);
            if (self.geometry) self.geometry.dispose();
            if (self.edges) self.edges.dispose();
            self.boxMaterials.forEach(m => m.dispose());
            self.renderer.dispose();
            const canvas = self.renderer.domElement;
            if (canvas && canvas.parentNode) canvas.parentNode.removeChild(canvas);
          }
        };
      }
    };

  // ========== Area for LLM-generated code ==========
    window.HOME_PAGE = {
      template: `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

      .home-container {
        width: 100%;
        height: 100%;
        font-family: 'Poppins', sans-serif;
        background: url('./assets/background.png') no-repeat center center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      /* Dark overlay for better text readability */
      .home-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4); /* Slight darkening */
        z-index: 0;
      }

      .content-wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 1600px;
      }

      .main-title {
        font-size: 72px;
        font-weight: 800;
        color: #fff;
        margin: 0;
        text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        letter-spacing: -1px;
        opacity: 0;
        animation: fadeInDown 0.8s ease-out forwards;
      }

      .sub-title {
        font-size: 32px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.95);
        margin-top: 10px;
        margin-bottom: 60px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        opacity: 0;
        animation: fadeInDown 0.8s ease-out 0.2s forwards;
      }

      .cards-container {
        display: flex;
        gap: 40px;
        justify-content: center;
        width: 100%;
        perspective: 1000px;
      }

      .activity-card {
        width: 380px;
        height: 480px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 24px;
        padding: 40px 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        opacity: 0;
        animation: fadeInUp 0.8s ease-out forwards;
        position: relative;
        overflow: hidden;
        border: 2px solid transparent;
      }

      /* Staggered animation delays */
      .activity-card:nth-child(1) { animation-delay: 0.4s; }
      .activity-card:nth-child(2) { animation-delay: 0.5s; }
      .activity-card:nth-child(3) { animation-delay: 0.6s; }

      .activity-card:hover {
        transform: translateY(-15px) scale(1.02);
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        background: #fff;
        border-color: rgba(102, 126, 234, 0.5);
      }

      .card-icon {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;

      initSlider(type, min, max) {
        const track = document.getElementById(`track-${type}-1`);
        const thumb = document.getElementById(`thumb-${type}-1`);

        const onMove = (e) => {
          if (!this.state.isDragging) return;

          const rect = track.getBoundingClientRect();
          const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;

            let relativeY = clientY - rect.top;
            percent = Math.max(0, Math.min(1, relativeY / rect.height));

            let relativeX = clientX - rect.left;
            percent = Math.max(0, Math.min(1, relativeX / rect.width));
          }

          // Map percent to Discrete Steps [2, 3, 4, 5]
          // 4 steps total. 
          // 0.00-0.25 -> 2
          // 0.25-0.50 -> 3
          // 0.50-0.75 -> 4
          // 0.75-1.00 -> 5
          const steps = max - min + 1; // 4
          const stepIndex = Math.floor(percent * steps);
          const safeIndex = Math.min(steps - 1, Math.max(0, stepIndex));

      init() {

      loadQuestion() {
        if (this.state.currentQuestion >= this.config.totalQuestions) {
          this.showResult();
          return;
        }

        // Update Header Progress
        const progressText = `${this.state.currentQuestion + 1}/${this.config.totalQuestions}`;
        // Re-render header part if needed or just assume header updates (Header function usually static, so we might need to manually update if framework doesn't)
        // Assuming createActivityHeader is static HTML, let's update the text manually if possible, or just proceed.
        // Finding the progress element from standard header structure (usually .header-right or similar)
        const headerProgress = document.querySelector('#activity-2 .progress');

        document.getElementById(`next-btn-2`).style.display = 'none';

      generateQuestion(index) {
        // Generate valid parameters
        // Fraction 1: Rows (num1/den1)
        // Fraction 2: Cols (num2/den2)

        const r = this.config.ranges;

        // Helper to get random int
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // Ensure denominators are at least 2 and numerator < denominator
        let den1 = rand(r.den1[0], r.den1[1]);
        let num1 = rand(r.num1[0], Math.min(r.num1[1], den1 - 1));

        let den2 = rand(r.den2[0], r.den2[1]);
        let num2 = rand(r.num2[0], Math.min(r.num2[1], den2 - 1));

        // Calculate Answer
        const correctEq = `${num1}/${den1} × ${num2}/${den2} = ${num1 * num2}/${den1 * den2}`;

        // Generate Distractors
        const options = new Set();
        options.add(correctEq);

        let safety = 0;
        while (options.size < 4 && safety < 50) {
          safety++;
          const type = rand(1, 3);
          let dNum1 = num1, dDen1 = den1, dNum2 = num2, dDen2 = den2;

          if (type === 1) { // Wrong numerator
            dNum1 = dNum1 === 1 ? 2 : 1;
          } else if (type === 2) { // Wrong denominator
            dDen2 = dDen2 === den2 ? (den2 === 5 ? 4 : den2 + 1) : dDen2;
          } else { // Swap params
            dNum1 = num2; dDen1 = den2; dNum2 = num1; dDen2 = den1;
          }

          // Ensure valid fraction
          if (dNum1 >= dDen1) dNum1 = dDen1 - 1;
          if (dNum2 >= dDen2) dNum2 = dDen2 - 1;
          if (dNum1 < 1) dNum1 = 1;
          if (dNum2 < 1) dNum2 = 1;

          const wrongEq = `${dNum1}/${dDen1} × ${dNum2}/${dDen2} = ${dNum1 * dNum2}/${dDen1 * dDen2}`;
          options.add(wrongEq);
        }

        // Convert Set to Array and Shuffle
        const optionsArr = Array.from(options).map(eq => ({
          text: eq,
          isCorrect: eq === correctEq
        }));

        // Shuffle
        for (let i = optionsArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [optionsArr[i], optionsArr[j]] = [optionsArr[j], optionsArr[i]];
        }

        return {
          rows: den1,
          rowShaded: num1,
          cols: den2,
          colShaded: num2,
          options: optionsArr
        };
      },

      renderQuestion() {
        const data = this.state.currentData;
        const gridEl = document.getElementById(`math-grid-2`);
        const optionsContainer = document.getElementById(`options-container-2`);

        // 1. Render Grid
        // Set grid template
        gridEl.style.gridTemplateRows = `repeat(${data.rows}, 1fr)`;
        gridEl.style.gridTemplateColumns = `repeat(${data.cols}, 1fr)`;

        let gridHTML = '';
        const totalCells = data.rows * data.cols;

        for (let i = 0; i < totalCells; i++) {
          const rowIndex = Math.floor(i / data.cols); // 0-based row index
          const colIndex = i % data.cols; // 0-based col index

          const isRowShaded = rowIndex < data.rowShaded;
          const isColShaded = colIndex < data.colShaded;

          let classes = ['grid-cell'];
          if (isRowShaded) classes.push('row-shaded');
          if (isColShaded) classes.push('col-shaded');
          if (isRowShaded && isColShaded) classes.push('intersection'); // Marker class

          gridHTML += `<div class="${classes.join(' ')}" data-index="${i}"></div>`;
        }
        gridEl.innerHTML = gridHTML;

        // 2. Render Options
        optionsContainer.innerHTML = '';
        data.options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          // Format equation for better display (spaces)
          btn.innerHTML = opt.text.replace('=', '&equals;').replace('×', '&times;');
          btn.onclick = (e) => this.checkAnswer(opt, e.target);
          optionsContainer.appendChild(btn);
        });
      },

      checkAnswer(optionData, btnElement) {
        if (!this.state.isAnswering) return;

        if (optionData.isCorrect) {
          // Correct
          this.state.isAnswering = false;
          this.state.score++;
          gameEngine.playSound('success');

          btnElement.classList.add('correct');
          document.getElementById(`feedback-area-2`).innerText = "Correct! The overlap is the product.";

          const intersections = document.querySelectorAll(`#activity-2 .grid-cell.intersection`);
          intersections.forEach(cell => {
            cell.classList.add('highlight-intersection');
          });

          // Show Next Button
          const nextBtn = document.getElementById(`next-btn-2`);
          nextBtn.style.display = 'block';

        } else {
          // Wrong
          gameEngine.playSound('error');
          btnElement.classList.add('wrong');
          // Remove wrong class after animation to allow re-shake
          setTimeout(() => btnElement.classList.remove('wrong'), 500);
          document.getElementById(`feedback-area-2`).innerText = "Try again! Look closely at the overlap.";
        }

        this.loadQuestion();

        const total = this.config.totalQuestions;

        // Update Header Progress
        const headerProgress = document.querySelector('#activity-3 .progress');
        if (headerProgress) headerProgress.textContent = progressText;

        // Select 2 unique random questions for this round
        const pool = [...this.config.preset_questions];
        const selection = [];

        // Random pick 1

        selection.push(pool[idx1]);

        selection.push(pool[idx2]);

        this.state.dragInstances.forEach(d => d.destroy && d.destroy());
        this.state.dragInstances = [];

        const pair = this.state.currentPair;

        // 1. Render Drop Zones (Equations)
        // We shuffle zones visually or keep order? Let's keep order of selection for zones
        pair.forEach((item, index) => {

          zone.className = 'drop-zone';

          zone.innerHTML = `

      `;

          // Register Drop Zone using GameEngine

        flyingItem.style.cssText = `
      position: fixed;
      width: 180px; height: 180px;
      left: ${cardEl.getBoundingClientRect().left}px;
      top: ${cardEl.getBoundingClientRect().top}px;
      z-index: 1000;
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
      object-fit: contain;
    `;
        document.body.appendChild(flyingItem);

        // Hide original
        cardEl.style.visibility = 'hidden';

        // Target position
        const zoneRect = zoneEl.getBoundingClientRect();
        const targetX = zoneRect.left + (zoneRect.width / 2) - 90; // 180/2 = 90
        const targetY = zoneRect.top + (zoneRect.height / 2) - 90;

        requestAnimationFrame(() => {
          flyingItem.style.left = `${targetX}px`;
          flyingItem.style.top = `${targetY}px`;
          flyingItem.style.transform = 'scale(0.8)'; // Shrink slightly to fit
        });

        // Cleanup and Update Zone
        setTimeout(() => {
          flyingItem.remove();

          // Update Zone State
          zoneEl.classList.add('filled');
          zoneEl.querySelector('.placeholder-icon').style.display = 'none';

          // Append image to zone
          const settledImg = document.createElement('img');
          settledImg.src = imgUrl;
          settledImg.className = 'slotted-image';
          zoneEl.appendChild(settledImg);

          // Remove card entirely
          cardEl.remove();

          // Update Game State
          this.state.matchedCount++;
          if (this.state.matchedCount >= 2) {
            this.onRoundComplete();
          }
        }, 500);
      },

      onMatchFail(cardEl) {
        gameEngine.playSound('error');
        gameEngine.showFeedback(cardEl, 'shake');
        this.resetCardPosition(cardEl);
      },

      resetCardPosition(cardEl) {
        cardEl.style.transition = 'transform 0.3s ease-out';
        cardEl.style.transform = 'translate(0, 0)';
        setTimeout(() => {
          cardEl.style.transition = '';
        }, 300);
      },

      onRoundComplete() {
        this.state.isComplete = true;
        const nextBtn = document.getElementById(`next-btn-3`);
        nextBtn.disabled = false;

        // Play a level complete sound or effect if available
        setTimeout(() => {
          gameEngine.playSound('success'); // Reinforce success
        }, 600);
      },

      nextQuestion() {
        if (this.state.currentQuestionIndex < this.config.totalQuestions - 1) {
          this.state.currentQuestionIndex++;
          this.loadQuestion();
        } else {
          this.showResult();
        }
      },

      showResult() {
        const container = document.getElementById(`activity-3`).querySelector('.activity-content');
        container.innerHTML = `
      <div style="text-align:center; margin-top:150px;">
  <h1 style="font-size:60px; color:#4CAF50;">Awesome!</h1>
  <p style="font-size:32px; color:#555;">You finished all matches.</p>
  <button onclick="ActivityManager.goHome()" style="margin-top:40px; padding:20px 60px; font-size:28px; background:#2196F3; color:white; border:none; border-radius:50px; cursor:pointer;">Back to Home</button>
      </div>
    `;
        document.getElementById(`next-btn-3`).style.display = 'none';
      },

      isOverlapping(rect1, rect2) {
        // A bit of tolerance (overlap must be significant)
        const tolerance = 50;
        return !(
          rect1.right < rect2.left + tolerance ||
          rect1.left > rect2.right - tolerance ||
          rect1.bottom < rect2.top + tolerance ||
          rect1.top > rect2.bottom - tolerance
        );
      },

      destroy() {
        this.state.dragInstances.forEach(d => d.destroy && d.destroy());
        // Cleanup any global listeners if added
      }
    };

  // Start
    document.addEventListener('DOMContentLoaded', () => {
      ActivityManager.show(0);
    });
  </script>
</body>

</html>
